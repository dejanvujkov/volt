# Builds .deb and .rpm packages of volt and attaches them to a GitHub
# Release whenever a tag matching v* is pushed.
# See docs/superpowers/specs/2026-04-26-deb-rpm-packaging-design.md.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for softprops/action-gh-release to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NFPM_VERSION: v2.46.3
      NFPM_SHA256: 9170d25ea056d7329def38134b2bcad98d02d221f8331610dcd619e84d28c565

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0   # required so `git describe` in the Makefile sees tags

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.2"

      - name: Verify embedded bat binary
        run: make verify-bat

      - name: Build volt binary
        run: make build

      - name: Install pinned nfpm
        run: |
          set -euo pipefail
          NFPM_VERSION_BARE="${NFPM_VERSION#v}"
          URL="https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/nfpm_${NFPM_VERSION_BARE}_Linux_x86_64.tar.gz"
          echo "→ Fetching nfpm ${NFPM_VERSION} from ${URL}"
          curl -fsSL --max-redirs 3 -o /tmp/nfpm.tar.gz "${URL}"
          ACTUAL=$(sha256sum /tmp/nfpm.tar.gz | awk '{print $1}')
          if [ "${ACTUAL}" != "${NFPM_SHA256}" ]; then
            echo "✗ nfpm sha256 mismatch: expected=${NFPM_SHA256} actual=${ACTUAL}"
            exit 1
          fi
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo mv /tmp/nfpm /usr/local/bin/nfpm
          sudo chmod 0755 /usr/local/bin/nfpm
          /usr/local/bin/nfpm --version

      - name: Derive package version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Package version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Build packages
        run: |
          set -euo pipefail
          mkdir -p dist
          nfpm pkg --packager deb --target dist/
          nfpm pkg --packager rpm --target dist/
          ls -lh dist/

      - name: Validate package count
        run: |
          set -euo pipefail
          shopt -s failglob
          debs=( dist/*.deb )
          rpms=( dist/*.rpm )
          if [ "${#debs[@]}" -ne 1 ]; then
            echo "✗ expected exactly 1 .deb, found ${#debs[@]}: ${debs[*]}"
            exit 1
          fi
          if [ "${#rpms[@]}" -ne 1 ]; then
            echo "✗ expected exactly 1 .rpm, found ${#rpms[@]}: ${rpms[*]}"
            exit 1
          fi
          echo "✓ exactly 1 .deb and 1 .rpm in dist/"

      - name: Sanitize asset filenames for GitHub upload
        # softprops/action-gh-release rewrites '~' to '.' in uploaded asset
        # filenames (the original name only survives as the asset label). If
        # SHA256SUMS is generated against the on-disk '~' name, downloaders
        # see a mismatch. Rename the on-disk files to their sanitized form
        # BEFORE generating SHA256SUMS so the sums file, the on-disk name,
        # and the GitHub asset name all agree. No-op for plain semver tags
        # without a pre-release component (e.g. v0.1.0).
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            new="${f//\~/.}"
            if [ "$f" != "$new" ]; then
              echo "→ ${f} → ${new}"
              mv -- "$f" "$new"
            fi
          done
          ls -lh

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.deb *.rpm > SHA256SUMS
          cat SHA256SUMS

      - name: Smoke-test package metadata
        # Prints metadata + contents AND asserts every expected path is
        # present in both packages. Without these assertions, an nfpm
        # behavior change (e.g. silently dropping `type: doc` files from
        # the .deb data archive) would slip past as green CI.
        run: |
          set -euo pipefail
          EXPECTED_PATHS=(
            ./usr/bin/volt
            ./usr/share/doc/volt/copyright
            ./usr/share/doc/volt/README.md
          )

          echo "→ .deb metadata:"
          dpkg-deb --info dist/*.deb
          echo "→ .deb contents:"
          deb_listing=$(dpkg-deb --contents dist/*.deb)
          echo "$deb_listing"
          for p in "${EXPECTED_PATHS[@]}"; do
            if ! grep -qE " ${p}\$" <<<"$deb_listing"; then
              echo "✗ .deb missing expected path: ${p}"
              exit 1
            fi
          done

          echo "→ .rpm metadata:"
          rpm -qpi dist/*.rpm
          echo "→ .rpm contents:"
          rpm_listing=$(rpm -qpl dist/*.rpm)
          echo "$rpm_listing"
          for p in "${EXPECTED_PATHS[@]}"; do
            stripped="${p#./}"
            if ! grep -qx "/${stripped}" <<<"$rpm_listing"; then
              echo "✗ .rpm missing expected path: /${stripped}"
              exit 1
            fi
          done

          echo "→ .rpm requirements:"
          rpm_reqs=$(rpm -qpR dist/*.rpm)
          echo "$rpm_reqs"
          for dep in sudo systemd; do
            if ! grep -qx "${dep}" <<<"$rpm_reqs"; then
              echo "✗ .rpm missing expected dependency: ${dep}"
              exit 1
            fi
          done

          echo "✓ all expected paths and deps present in both packages"

      - name: Publish GitHub Release
        # Pinned to v2.6.2 commit SHA. softprops/action-gh-release has write
        # access to the release; SHA pinning protects against a compromised or
        # accidentally-broken upstream release. Bump deliberately when checked.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65   # v2.6.2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
